<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Alex Studio</title>
  <meta name="description" content="Alex Studio Dashboard" />
  <style>
    :root {
      --bg: #07111f;
      --bg2: #0d1b2d;
      --panel: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.1);
      --text: #edf4ff;
      --muted: #9eb0c9;
      --good: #34d399;
      --warn: #f59e0b;
      --bad: #fb7185;
      --blue: #60a5fa;
      --cyan: #67e8f9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.20), transparent 28%),
        radial-gradient(circle at bottom right, rgba(52,211,153,.12), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    }
    .wrap { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
    .brand h1 { margin:0; font-size:clamp(28px,4vw,42px); letter-spacing:-.03em; }
    .brand p { margin:8px 0 0; color:var(--muted); font-size:14px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--text); padding:10px 14px; border-radius:12px; text-decoration:none; font-size:14px; cursor:pointer; }
    .btn.primary { background:linear-gradient(135deg, var(--cyan), var(--blue)); color:#08101f; border:none; font-weight:700; }
    .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
    .card { grid-column:span 12; border:1px solid var(--line); background:var(--panel); backdrop-filter:blur(12px); border-radius:20px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,.22); }
    .metric { grid-column:span 3; }
    .half { grid-column:span 6; }
    .label { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .value { font-size:clamp(28px,4vw,42px); font-weight:800; letter-spacing:-.03em; }
    .sub { margin-top:8px; color:var(--muted); font-size:13px; }
    .status { display:inline-flex; align-items:center; gap:8px; border-radius:999px; padding:7px 12px; font-size:13px; font-weight:700; }
    .status.good { background:rgba(52,211,153,.14); color:#86efac; }
    .status.warn { background:rgba(245,158,11,.14); color:#fcd34d; }
    .status.bad { background:rgba(251,113,133,.14); color:#fda4af; }
    .list { display:grid; gap:12px; margin-top:14px; }
    .row { display:flex; justify-content:space-between; gap:12px; padding:12px 14px; border-radius:14px; border:1px solid rgba(255,255,255,.06); background:rgba(255,255,255,.03); font-size:14px; }
    .row span:last-child { color:var(--muted); }
    .bar { height:12px; border-radius:999px; background:rgba(255,255,255,.07); overflow:hidden; margin-top:14px; }
    .fill { height:100%; border-radius:inherit; background:linear-gradient(90deg, var(--cyan), var(--blue)); width:0%; transition:width .6s ease; }
    .footnote { margin-top:16px; color:var(--muted); font-size:12px; }
    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    .source-badge { display:inline-flex; margin-top:10px; padding:6px 10px; border-radius:999px; font-size:12px; border:1px solid var(--line); color:var(--muted); }
    @media (max-width: 900px) { .metric, .half { grid-column:span 12; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <h1>OpenAI Usage Dashboard</h1>
        <p id="pageDesc">Alex Studio · 优先读取 `/api/openai-usage`，失败时自动回退到演示假数据</p>
        <div class="source-badge" id="sourceBadge">数据源：等待加载</div>
      </div>
      <div class="actions">
        <a class="btn" href="/">返回首页</a>
        <button class="btn primary" id="refreshBtn">刷新</button>
      </div>
    </div>

    <div class="grid">
      <section class="card metric"><div class="label">5 小时额度</div><div class="value" id="quota5h">--</div><div class="sub" id="quota5hSub">等待加载</div></section>
      <section class="card metric"><div class="label">7 天额度</div><div class="value" id="quota7d">--</div><div class="sub" id="quota7dSub">等待加载</div></section>
      <section class="card metric"><div class="label">采集状态</div><div id="collectorStatus" class="status warn">等待数据</div><div class="sub" id="collectorSub">尚未接入真实采集器</div></section>
      <section class="card metric"><div class="label">最后更新时间</div><div class="value" id="updatedAt" style="font-size:22px;">--</div><div class="sub">接口或演示时间戳</div></section>

      <section class="card half"><div class="label">5 小时使用进度</div><div class="value" id="used5h">--</div><div class="bar"><div class="fill" id="fill5h"></div></div><div class="footnote" id="used5hSub">等待加载</div></section>
      <section class="card half"><div class="label">7 天使用进度</div><div class="value" id="used7d">--</div><div class="bar"><div class="fill" id="fill7d"></div></div><div class="footnote" id="used7dSub">等待加载</div></section>

      <section class="card half"><div class="label">最近采集记录</div><div class="list" id="recentList"></div></section>
      <section class="card half">
        <div class="label">当前说明</div>
        <div class="list">
          <div class="row"><span>目标接口</span><span class="mono">GET /api/openai-usage</span></div>
          <div class="row"><span>当前模式</span><span id="modeText">等待加载</span></div>
          <div class="row"><span>部署方式</span><span>Cloudflare Pages</span></div>
          <div class="row"><span>后续目标</span><span>Ubuntu 采集器 → API → 页面</span></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    function rand(min, max) { return Math.random() * (max - min) + min; }
    function pct(n) { return Math.max(0, Math.min(100, n)); }
    function formatPercent(v) { return Number(v).toFixed(1) + '%'; }
    function pad(n) { return String(n).padStart(2, '0'); }
    function formatTime(input) {
      const d = input instanceof Date ? input : new Date(input);
      if (Number.isNaN(d.getTime())) return '--';
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }
    function buildDemoRuns() {
      const states = ['success', 'success', 'success', 'warn'];
      const base = Date.now();
      return Array.from({ length: 4 }).map((_, i) => ({
        id: `collector-run-${String(i + 1).padStart(3, '0')}`,
        status: states[Math.floor(Math.random() * states.length)],
        finished_at: new Date(base - (3 + i * 7) * 60 * 1000).toISOString()
      }));
    }
    function buildDemoPayload() {
      const q5 = rand(62, 91);
      const q7 = rand(48, 87);
      const status = q5 > 45 ? 'ok' : q5 > 20 ? 'warning' : 'error';
      return {
        ok: true,
        source: 'demo-fallback',
        generated_at: new Date().toISOString(),
        quota: {
          window_5h: { remaining_percent: q5, used_percent: 100 - q5, status: q5 > 45 ? 'healthy' : q5 > 20 ? 'warning' : 'danger' },
          window_7d: { remaining_percent: q7, used_percent: 100 - q7, status: q7 > 45 ? 'healthy' : q7 > 20 ? 'warning' : 'danger' }
        },
        collector: {
          status,
          message: status === 'ok' ? 'demo collector is healthy' : status === 'warning' ? 'demo collector warns remaining quota is dropping' : 'demo collector shows quota danger',
          last_run_at: new Date().toISOString()
        },
        recent_runs: buildDemoRuns(),
        errors: []
      };
    }
    function mapCollectorClass(status) {
      if (status === 'ok' || status === 'healthy' || status === 'success') return 'good';
      if (status === 'warning' || status === 'warn') return 'warn';
      return 'bad';
    }
    function mapCollectorText(status) {
      if (status === 'ok' || status === 'healthy' || status === 'success') return '正常';
      if (status === 'warning' || status === 'warn') return '偏紧张';
      return '危险';
    }
    function renderRuns(items) {
      const list = document.getElementById('recentList');
      list.innerHTML = '';
      const rows = Array.isArray(items) && items.length ? items : [{ id: 'no-runs', status: 'empty', finished_at: new Date().toISOString() }];
      for (const item of rows.slice(0, 6)) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<span>${item.id || 'unknown'} · ${item.status || 'unknown'}</span><span>${formatTime(item.finished_at || item.last_run_at)}</span>`;
        list.appendChild(row);
      }
    }
    function renderPayload(payload, mode) {
      const q5 = payload?.quota?.window_5h?.remaining_percent ?? 0;
      const u5 = payload?.quota?.window_5h?.used_percent ?? (100 - q5);
      const q7 = payload?.quota?.window_7d?.remaining_percent ?? 0;
      const u7 = payload?.quota?.window_7d?.used_percent ?? (100 - q7);
      const collectorStatus = payload?.collector?.status ?? 'warning';
      const collectorText = mapCollectorText(collectorStatus);
      const collectorClass = mapCollectorClass(collectorStatus);

      document.getElementById('quota5h').textContent = formatPercent(q5);
      document.getElementById('quota7d').textContent = formatPercent(q7);
      document.getElementById('quota5hSub').textContent = `预计剩余可用额度 ${Number(q5).toFixed(1)}%`;
      document.getElementById('quota7dSub').textContent = `7 天窗口剩余 ${Number(q7).toFixed(1)}%`;
      document.getElementById('used5h').textContent = formatPercent(u5);
      document.getElementById('used7d').textContent = formatPercent(u7);
      document.getElementById('used5hSub').textContent = `5h 已使用 ${Number(u5).toFixed(1)}%，剩余 ${Number(q5).toFixed(1)}%`;
      document.getElementById('used7dSub').textContent = `7d 已使用 ${Number(u7).toFixed(1)}%，剩余 ${Number(q7).toFixed(1)}%`;
      document.getElementById('fill5h').style.width = pct(u5) + '%';
      document.getElementById('fill7d').style.width = pct(u7) + '%';
      document.getElementById('updatedAt').textContent = formatTime(payload?.generated_at || payload?.collector?.last_run_at);

      const statusEl = document.getElementById('collectorStatus');
      statusEl.className = `status ${collectorClass}`;
      statusEl.textContent = collectorText;
      document.getElementById('collectorSub').textContent = payload?.collector?.message || '无状态说明';
      document.getElementById('sourceBadge').textContent = `数据源：${payload?.source || mode}`;
      document.getElementById('modeText').textContent = mode === 'api' ? '真实接口读取成功' : mode === 'mock-json' ? '静态 mock JSON 已接管展示' : '接口不可用，已回退演示数据';
      renderRuns(payload?.recent_runs);
    }
    async function tryFetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`${url} -> HTTP ${res.status}`);
      return await res.json();
    }
    async function loadUsageData(forceDemo = false) {
      if (forceDemo) {
        renderPayload(buildDemoPayload(), 'demo');
        return;
      }
      try {
        let payload;
        try {
          payload = await tryFetchJson('/api/openai-usage');
          renderPayload(payload, 'api');
          return;
        } catch (firstErr) {
          console.warn('primary api fetch failed:', firstErr);
        }
        payload = await tryFetchJson('/api/openai-usage.json');
        if (!payload || payload.ok === false) throw new Error('mock json returned error state');
        renderPayload(payload, 'mock-json');
      } catch (err) {
        console.warn('api + mock json failed, fallback to demo data:', err);
        renderPayload(buildDemoPayload(), 'demo');
      }
    }
    document.getElementById('refreshBtn').addEventListener('click', () => loadUsageData(false));
    loadUsageData(false);
  </script>
</body>
</html>
